<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-O الأسطورية بالغرف</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --grid-color: #1e293b;
            --x-color: #38bdf8;
            --o-color: #f43f5e;
            --text-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            text-shadow: 0 0 10px var(--x-color);
        }

        #status {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #94a3b8;
            font-weight: bold;
        }

        /* واجهة الدخول للغرفة */
        #room-selection {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: var(--grid-color);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        input {
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
            border: 2px solid #475569;
            background: var(--bg-color);
            color: white;
            text-align: center;
        }

        /* شبكة اللعبة */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 12px;
            width: 90vw;
            max-width: 400px;
            height: 90vw;
            max-height: 400px;
            background-color: var(--grid-color);
            padding: 12px;
            border-radius: 20px;
            display: none; /* مخفية حتى يدخل الغرفة */
        }

        .cell {
            background-color: var(--bg-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .cell.X { color: var(--x-color); text-shadow: 0 0 15px var(--x-color); }
        .cell.O { color: var(--o-color); text-shadow: 0 0 15px var(--o-color); }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--x-color), #2563eb);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>تحدي X-O الأونلاين</h1>
    
    <div id="room-selection">
        <h2>ادخل رقم أو اسم الغرفة للعب</h2>
        <input type="text" id="roomInput" placeholder="مثلاً: 5599" />
        <button id="joinBtn">دخول الغرفة</button>
    </div>

    <div id="status" style="display: none;">جاري تجهيز الغرفة...</div>

    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <button id="restartBtn" style="display:none;">إعادة تحدي جديد</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let mySymbol = null;
        let isMyTurn = false;
        let boardState = Array(9).fill("");
        
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('status');
        const restartBtn = document.getElementById('restartBtn');
        const boardDiv = document.getElementById('board');
        const roomSelection = document.getElementById('room-selection');
        const roomInput = document.getElementById('roomInput');
        const joinBtn = document.getElementById('joinBtn');

        // نظام الصوت
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'click') {
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            }
        }

        // عند الضغط على زر دخول الغرفة
        joinBtn.addEventListener('click', () => {
            const roomName = roomInput.value.trim();
            if (roomName !== "") {
                socket.emit('joinRoom', roomName);
                roomSelection.style.display = 'none';
                statusText.style.display = 'block';
            } else {
                alert("الرجاء كتابة اسم الغرفة أولاً!");
            }
        });

        socket.on('init', (symbol) => {
            mySymbol = symbol;
            isMyTurn = (mySymbol === 'X');
            boardDiv.style.display = 'grid'; // إظهار اللعبة
            statusText.innerText = `أنت لاعب: ${mySymbol} | ${isMyTurn ? "دورك الآن!" : "انتظر الخصم..."}`;
        });

        socket.on('full', (msg) => {
            alert(msg);
            window.location.reload();
        });

        cells.forEach(cell => {
            cell.addEventListener('click', () => {
                const index = cell.getAttribute('data-index');
                if (!isMyTurn || boardState[index] !== "" || checkWinner()) return;

                playSound('click');
                makeMove(index, mySymbol);
                socket.emit('playerMove', { index, symbol: mySymbol });
                isMyTurn = false;
                statusText.innerText = "انتظر حركة الخصم...";
                checkGameResult();
            });
        });

        socket.on('enemyMove', (data) => {
            playSound('click');
            makeMove(data.index, data.symbol);
            isMyTurn = true;
            statusText.innerText = "دورك هسا، فرجيه مهاراتك!";
            checkGameResult();
        });

        function makeMove(index, symbol) {
            boardState[index] = symbol;
            cells[index].innerText = symbol;
            cells[index].classList.add(symbol);
        }

        function checkGameResult() {
            const winner = checkWinner();
            if (winner) {
                statusText.innerText = winner === mySymbol ? "🎉 كفوووو! أنت الفائز!" : "💥 الخصم فاز هالمرة!";
                restartBtn.style.display = "block";
            } else if (!boardState.includes("")) {
                statusText.innerText = "🤝 تعادل أسطوري!";
                restartBtn.style.display = "block";
            }
        }

        function checkWinner() {
            const winPatterns = [[0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]];
            for (let pattern of winPatterns) {
                const [a, b, c] = pattern;
                if (boardState[a] && boardState[a] === boardState[b] && boardState[a] === boardState[c]) return boardState[a];
            }
            return null;
        }

        restartBtn.addEventListener('click', () => { socket.emit('restartGame'); });
        socket.on('restart', () => {
            boardState = Array(9).fill("");
            cells.forEach(cell => { cell.innerText = ""; cell.className = "cell"; });
            isMyTurn = (mySymbol === 'X');
            statusText.innerText = `تمت إعادة اللعبة! أنت: ${mySymbol}`;
            restartBtn.style.display = "none";
        });

        socket.on('playerLeft', () => {
            statusText.innerText = "الخصم غادر الغرفة! أعد تحميل الصفحة.";
        });
    </script>
</body>
</html>
