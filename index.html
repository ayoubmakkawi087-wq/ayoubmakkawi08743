<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي X-O الأونلاين المطوّر</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* تعريف متغيرات الألوان المريحة للعين */
        :root {
            --bg-color: #f0f4f8;
            --container-bg: #ffffff;
            --text-color: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent-x: #ef4444;
            --accent-o: #10b981;
            --border-color: #cbd5e1;
            --chat-bg: #f8fafc;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f8fafc;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent-x: #f87171;
            --accent-o: #34d399;
            --border-color: #334155;
            --chat-bg: #0f172a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .card {
            background-color: var(--container-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 24px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
            transition: background-color 0.3s;
        }

        /* شاشات اللعبة التبادلية */
        .screen { display: none; }
        .screen.active { display: block; }

        h1 { font-size: 24px; margin-bottom: 20px; }
        h2 { font-size: 18px; margin: 10px 0; }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--container-bg);
            color: var(--text-color);
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 15px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover { background-color: var(--primary-hover); }
        button:active { transform: scale(0.98); }

        .btn-secondary {
            background-color: #64748b;
        }
        .btn-secondary:hover { background-color: #475569; }

        .btn-danger {
            background-color: #dc2626;
        }
        .btn-danger:hover { background-color: #b91c1c; }

        /* لوحة التحكم العلوية (الإعدادات والوضع الليلي) */
        .top-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }
        .icon-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 20px;
            cursor: pointer;
            width: auto;
            padding: 5px 10px;
            margin: 0;
        }

        /* شبكة اللعب X-O */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .cell {
            aspect-ratio: 1;
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 36px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .cell.X { color: var(--accent-x); }
        .cell.O { color: var(--accent-o); }

        /* الأسماء وحالة الدور */
        .players-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 14px;
        }
        #status {
            margin: 15px 0;
            font-size: 16px;
            font-weight: bold;
        }

        /* نافذة شاشة نهاية اللعبة المنبثقة */
        .modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            border-radius: 16px;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            z-index: 20;
        }
        .modal.active { display: flex; }
        .modal h2 { color: white; font-size: 24px; margin-bottom: 20px; }

        /* نظام الشات المدمج داخل اللعبة */
        .chat-container {
            margin-top: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--chat-bg);
            text-align: right;
        }
        .chat-messages {
            height: 100px;
            overflow-y: auto;
            padding: 8px;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .chat-input-area {
            display: flex;
            border-top: 1px solid var(--border-color);
        }
        .chat-input-area input {
            flex: 1;
            border: none;
            padding: 8px;
            background: transparent;
            color: var(--text-color);
            font-size: 14px;
        }
        .chat-input-area button {
            width: auto;
            margin: 0;
            border-radius: 0 0 8px 0;
            padding: 8px 12px;
        }

        /* نافذة الإعدادات */
        .settings-panel {
            display: none;
            margin-top: 15px;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            text-align: right;
        }
        .settings-panel.active { display: block; }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="top-bar">
            <button class="icon-btn" id="themeBtn" title="تبديل الوضع">🌙</button>
            <button class="icon-btn" id="settingsToggleBtn" title="الإعدادات">⚙️</button>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <h3>إعدادات اللعبة</h3>
            <div class="setting-row">
                <label>مستوى الصوت:</label>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
            </div>
            <button class="btn-secondary" style="padding:5px; font-size:12px;" onclick="toggleSettings()">إغلاق</button>
        </div>

        <div class="screen" id="screenName">
            <h1>أهلاً بك في التحدي الأسطوري</h1>
            <p>الرجاء إدخال اسمك للبدء (الحد الأقصى 12 حرفاً):</p>
            <input type="text" id="usernameInput" placeholder="اكتب اسمك هنا..." maxlength="12">
            <button onclick="saveNameAndContinue()">حفظ المتابعة</button>
        </div>

        <div class="screen" id="screenMenu">
            <h1>تحدي X-O الأونلاين</h1>
            <p id="welcomeBackText"></p>
            <button onclick="joinRandomGame()">⚔️ لعب عشوائي</button>
            <button class="btn-secondary" onclick="showRoomOptions()">🏠 اللعب داخل روم</button>
        </div>

        <div class="screen" id="screenRoomMenu">
            <h1>دخول الروم المخصص</h1>
            <input type="text" id="roomCodeInput" placeholder="أدخل رقم أو اسم الروم">
            <button onclick="joinCustomRoom()">دخول / إنشاء روم</button>
            <button class="btn-secondary" onclick="showScreen('screenMenu')">العودة للقائمة الرئيسية</button>
        </div>

        <div class="screen" id="screenWaiting">
            <h2 id="waitingMessage">جاري البحث عن خصم...</h2>
            <div style="margin: 20px 0;">⏳</div>
            <button class="btn-danger" onclick="leaveActiveGame()">إلغاء والعودة للقائمة</button>
        </div>

        <div class="screen" id="screenGame">
            <div class="players-info">
                <div>أنت: <span id="myInfo" style="color:var(--primary)">-</span></div>
                <div>الخصم: <span id="opponentInfo" style="color:var(--accent-x)">-</span></div>
            </div>
            
            <div id="status">انتظر حركتك...</div>

            <div class="game-grid" id="board">
                <div class="cell" onclick="cellClicked(0)"></div>
                <div class="cell" onclick="cellClicked(1)"></div>
                <div class="cell" onclick="cellClicked(2)"></div>
                <div class="cell" onclick="cellClicked(3)"></div>
                <div class="cell" onclick="cellClicked(4)"></div>
                <div class="cell" onclick="cellClicked(5)"></div>
                <div class="cell" onclick="cellClicked(6)"></div>
                <div class="cell" onclick="cellClicked(7)"></div>
                <div class="cell" onclick="cellClicked(8)"></div>
            </div>

            <button class="btn-danger" onclick="leaveActiveGame()">🚪 خروج من الروم</button>

            <div class="chat-container">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="اكتب رسالة سريعة للخصم...">
                    <button onclick="sendChatMessage()">إرسال</button>
                </div>
            </div>
        </div>

        <div class="modal" id="endGameModal">
            <h2 id="modalResultText">لقد فزت! 🎉</h2>
            <button onclick="requestRestart()">🔄 اللعب مرة أخرى</button>
            <button class="btn-secondary" onclick="closeModalAndGoHome()">🏠 الصفحة الرئيسية</button>
        </div>

    </div>

    <script>
        const socket = io();
        let myName = "";
        let currentRoom = "";
        let mySymbol = "";
        let isMyTurn = false;
        let volume = 0.5;

        // إعداد الأصوات السينثسايزر المريحة للأذن
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration) {
            if (volume === 0) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(volume * 0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playClickSound() { playTone(523.25, 'sine', 0.1); } // نغمة كليك هادئة ومريحة C5
        function playWinSound() { playTone(587.33, 'sine', 0.15); setTimeout(() => playTone(880, 'sine', 0.3), 120); } // نغمة فوز مبهجة وهادئة
        function playLoseSound() { playTone(349.23, 'sine', 0.2); setTimeout(() => playTone(220, 'sine', 0.4), 180); } // نغمة خسارة خفيفة

        // نظام الحفظ والتحميل التلقائي للاسم والوضع المفضّل عند الفتح لأول مرة
        window.onload = function() {
            const savedName = localStorage.getItem('xo_player_name');
            const savedTheme = localStorage.getItem('xo_theme') || 'light';
            
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('themeBtn').innerText = savedTheme === 'dark' ? '☀️' : '🌙';

            if (savedName) {
                myName = savedName;
                socket.emit('setPlayerName', myName);
                document.getElementById('welcomeBackText').innerText = `مرحباً بك مجدداً يا ${myName}!`;
                showScreen('screenMenu');
            } else {
                showScreen('screenName');
            }
        };

        // التبديل بين الشاشات بسلاسة
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('active');
        }

        // حفظ الاسم والمتابعة للرئيسية
        function saveNameAndContinue() {
            const input = document.getElementById('usernameInput').value.trim();
            if(!input) return alert("الرجاء كتابة اسمك أولاً!");
            if(input.length > 12) return alert("الاسم طويل جداً! الحد الأقصى 12 حرفاً.");
            
            myName = input;
            localStorage.setItem('xo_player_name', myName);
            socket.emit('setPlayerName', myName);
            document.getElementById('welcomeBackText').innerText = `مرحباً بك يا ${myName}!`;
            showScreen('screenMenu');
        }

        // تفعيل أزرار القائمة الرئيسية للغرفة والعشوائي
        function joinRandomGame() {
            playClickSound();
            socket.emit('joinRandom');
        }

        function showRoomOptions() {
            playClickSound();
            showScreen('screenRoomMenu');
        }

        function joinCustomRoom() {
            playClickSound();
            const code = document.getElementById('roomCodeInput').value.trim();
            if(!code) return alert("الرجاء إدخال رقم أو كود الروم!");
            socket.emit('joinRoom', code);
        }

        // أحداث وقراءة أوامر السيرفر (Socket events)
        socket.on('waiting', (msg) => {
            document.getElementById('waitingMessage').innerText = msg;
            showScreen('screenWaiting');
        });

        socket.on('roomFull', (msg) => {
            alert(msg);
        });

        socket.on('gameStart', (data) => {
            currentRoom = data.room;
            mySymbol = data.symbol;
            isMyTurn = (mySymbol === 'X');

            document.getElementById('myInfo').innerText = `${myName} (${mySymbol})`;
            document.getElementById('opponentInfo').innerText = data.opponentName;
            
            updateStatusText();
            resetVisualBoard();
            
            // تنظيف شات الجيم السابق
            document.getElementById('chatMessages').innerHTML = "";
            
            showScreen('screenGame');
        });

        function cellClicked(index) {
            if (!isMyTurn) return;
            const cells = document.querySelectorAll('.cell');
            if (cells[index].innerText !== "") return;

            playClickSound();
            socket.emit('makeMove', { room: currentRoom, index: index, symbol: mySymbol });
        }

        socket.on('moveMade', (data) => {
            const cells = document.querySelectorAll('.cell');
            cells[data.index].innerText = data.symbol;
            cells[data.index].classList.add(data.symbol);

            isMyTurn = (data.nextTurnSymbol === mySymbol);
            updateStatusText();
            checkGameState();
        });

        function updateStatusText() {
            const statusText = document.getElementById('status');
            statusText.innerText = isMyTurn ? "دورك الآن، العب حركتك الفخمة!" : "انتظر حركة الخصم...";
        }

        function resetVisualBoard() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.innerText = "";
                cell.className = "cell";
            });
        }

        // فحص الفوز والخسارة محلياً وفورياً للاعبين
        function checkGameState() {
            const cells = document.querySelectorAll('.cell');
            const b = Array.from(cells).map(c => c.innerText);

            const winPatterns = [
                [0,1,2], [3,4,5], [6,7,8],
                [0,3,6], [1,4,7], [2,5,8],
                [0,4,8], [2,4,6]
            ];

            let winner = null;
            for (let p of winPatterns) {
                if (b[p[0]] && b[p[0]] === b[p[1]] && b[p[0]] === b[p[2]]) {
                    winner = b[p[0]];
                    break;
                }
            }

            if (winner) {
                if (winner === mySymbol) {
                    playWinSound();
                    showEndGameModal("لقد انتصرت بجدارة أسطورية! 🎉");
                } else {
                    playLoseSound();
                    showEndGameModal("حظاً أوفر، فاز الخصم هذه الجولة! 💔");
                }
                isMyTurn = false;
            } else if (!b.includes("")) {
                playClickSound();
                showEndGameModal("تعادل قوي بين الطرفين! 🤝");
                isMyTurn = false;
            }
        }

        function showEndGameModal(text) {
            document.getElementById('modalResultText').innerText = text;
            document.getElementById('endGameModal').classList.add('active');
        }

        function requestRestart() {
            playClickSound();
            document.getElementById('endGameModal').classList.remove('active');
            socket.emit('restartGame', currentRoom);
        }

        socket.on('restart', () => {
            resetVisualBoard();
            isMyTurn = (mySymbol === 'X');
            updateStatusText();
        });

        function closeModalAndGoHome() {
            playClickSound();
            document.getElementById('endGameModal').classList.remove('remove');
            leaveActiveGame();
        }

        function leaveActiveGame() {
            playClickSound();
            document.getElementById('endGameModal').classList.remove('active');
            socket.emit('leaveRoom');
            showScreen('screenMenu');
        }

        socket.on('playerLeft', () => {
            alert("غادر الخصم اللعبة! سنعود بك للقائمة الرئيسية.");
            showScreen('screenMenu');
        });

        // تشغيل وإرسال شات اللعبة المباشر
        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if(!msg) return;

            socket.emit('sendChatMessage', { room: currentRoom, message: msg });
            input.value = "";
        }

        socket.on('receiveChatMessage', (data) => {
            const chatBox = document.getElementById('chatMessages');
            const msgElement = document.createElement('div');
            msgElement.innerHTML = `<strong>${data.sender}:</strong> ${data.message}`;
            chatBox.appendChild(msgElement);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        // كود تشغيل إرسال شات بالضغط على زر Enter بالماوس
        document.getElementById('chatInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendChatMessage();
        });

        // أزرار التحكم بالصوت والوضع الليلي/النهاري المريح للعين
        document.getElementById('themeBtn').addEventListener('click', () => {
            let currentTheme = document.documentElement.getAttribute('data-theme');
            let newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('xo_theme', newTheme);
            document.getElementById('themeBtn').innerText = newTheme === 'dark' ? '☀️' : '🌙';
            playClickSound();
        });

        document.getElementById('volumeSlider').addEventListener('input', (e) => {
            volume = parseFloat(e.target.value);
        });

        document.getElementById('settingsToggleBtn').addEventListener('click', () => {
            toggleSettings();
            playClickSound();
        });
    </script>
</body>
</html>
